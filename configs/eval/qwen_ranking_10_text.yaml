# Experiment: Qwen3VL-2B-Instruct · ranking prompt · split_10_text
# Naming convention: configs/eval/<model>_<prompt>_<split>.yaml

seed: 0

model:
  name: Qwen3VL-2B-Instruct
  hf_id: Qwen/Qwen3-VL-2B-Instruct
  temperature: 0.2
  max_tokens: 512
  top_p: 0.9
  batch_size: 1

data:
  instances: output/split_10_text/instances.jsonl
  kb: output/split_10_text/kb.jsonl
  n_samples: 20                  # number of instances to sample (null = all)
  image_max_side: 1280           # downscale cached images to this max side (px)

prompt:
  template: ranking              # name of eval/prompts/<template>.yaml
  use_entity_description: true   # candidate lines include the entity description
  use_entity_image: true         # candidate infobox image attached after each line
  shuffle_candidates: true       # if false, the answer is always presented first
