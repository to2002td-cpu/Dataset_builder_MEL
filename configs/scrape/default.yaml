data_dir: ./output/scrape_data     # intermediate stage files (S1–S6 checkpoints)
output_dir: ./output/raw_dataset   # raw assembled dataset (S7)

wikipedia_rate_limit: 0.5
wikidata_rate_limit: 0.5

n_workers: 10

api_batch_size: 50          # pages/titles per Wikipedia or Wikidata REST call
entity_data_batch_size: 200 # QIDs per combined SPARQL query (entity data + type, S3/S6)

save_every: 200
log_level: INFO
