entity:
  types: [PERS, ORG, LOC]   # KB entity types to keep
  intro: true               # only keep entities with an intro paragraph
  image: true               # only keep entities with an image

image:
  mime: image/jpeg          # required MIME type
  min_dim: 250              # minimum width AND height (px)
  min_used_by: 2            # minimum Wikipedia image reuse
  max_used_by: 100           # maximum Wikipedia image reuse

mention:
  min_len: 3               # minimum surface-form length (chars)
  banwords: ["and"]        #if and -> two entities

categories:
  include:                  # page must be in at least one of these categories
    - "Category:Human name disambiguation pages"
    - "Category:Disambiguation pages with surname-holder lists"
    - "Category:Disambiguation pages with given-name-holder lists"
    - "Category:Place name disambiguation pages"
    - "Category:Buildings and structures disambiguation pages"
    - "Category:Airport disambiguation pages"
    - "Category:Architectural disambiguation pages"
    - "Category:Educational institution disambiguation pages"
    - "Category:Hospital disambiguation pages"
    - "Category:Religious buildings and structures disambiguation pages"
    - "Category:Buddhist temple disambiguation pages"
    - "Category:Church building disambiguation pages"
    - "Category:Mosque disambiguation pages"
    - "Category:Synagogue disambiguation pages"
    - "Category:Station disambiguation pages"
  exclude: []               # page is dropped if it's in any of these categories

candidates:
  min_visual: 2             # min KB entities sharing an image (visual ambiguity)
  max_text: 100             # max KB entities sharing a mention (drops generic fragments, e.g. "Cerro")
