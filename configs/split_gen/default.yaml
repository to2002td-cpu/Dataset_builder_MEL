entity:
  types: [PERS, ORG, LOC]   # KB entity types to keep
  intro: true               # only keep entities with an intro paragraph
  image: true               # only keep entities with an image

image:
  mime: image/jpeg          # required MIME type
  min_dim: 250              # minimum width AND height (px)
  min_used_by: 2            # minimum Wikipedia image reuse
  max_used_by: 10           # maximum Wikipedia image reuse

mention:
  min_len: 3               # minimum surface-form length (chars)
  banwords: ["and"] #if and -> two entities

categories:
  include: []              # if non-empty, page must be in at least one of these categories
  exclude: []               # page is dropped if it's in any of these categories

candidates:
  min_text: 2               # min KB entities sharing the mention
  max_text: 10              # max KB entities sharing the mention (drops generic fragments, e.g. "Cerro")
  min_visual: 2             # min KB entities sharing the body image
  max_visual: 0             # max KB entities sharing the body image (0 = no limit)
  require_answer_type_shared: false
  require_unique_candidate_infoboxes: false
  max_instances_per_answer: 0             # 0 = no cap
  max_instances_per_image: 0             # 0 = no cap
